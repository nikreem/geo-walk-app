<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoRandomizer - Creator Edition</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --font-apple: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            --bg-space: #000000;
            --panel-bg: rgba(15, 15, 15, 0.75);
            --card-inner: rgba(30, 30, 30, 0.6);
            --border-glow: rgba(255, 255, 255, 0.15);
            --accent-white: #ffffff;
            --accent-black: #000000;
            --text-main: #ffffff;
            --text-muted: #999999;
            --admin-color: #ff3b30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: var(--font-apple);
            background-color: var(--bg-space);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 430px; 
            height: 100%;
            max-height: 932px;
            position: relative;
            background: var(--bg-space);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
        }

        @media (min-width: 440px) {
            .app-container {
                height: 90vh;
                border-radius: 40px;
                border: 4px solid #222;
            }
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* ВЕРХНИЙ БЛОК: Профиль Создателя */
        .top-hud {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            z-index: 1000;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-glow);
            border-radius: 18px;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }

        .profile-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-meta {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar-frame {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent-white);
            color: var(--accent-black);
            border: 2px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
        }

        .user-name {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .lvl-badge {
            font-size: 10px;
            color: var(--accent-black);
            background: var(--accent-white);
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .right-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .wallet-selector {
            background: var(--card-inner);
            border: 1px solid var(--border-glow);
            padding: 6px 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
        }

        /* Кнопка переключения тест-функций */
        .admin-toggle-btn {
            background: var(--admin-color);
            color: #fff;
            border: none;
            padding: 6px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            display: none; /* Видна только админу */
            box-shadow: 0 0 10px rgba(255, 59, 48, 0.4);
            text-transform: uppercase;
        }

        /* ТЕСТОВАЯ АДМИН ПАНЕЛЬ */
        .admin-panel-popup {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            z-index: 2000;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--admin-color);
            border-radius: 18px;
            padding: 14px;
            display: none;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .admin-panel-title {
            font-size: 12px;
            font-weight: 800;
            color: var(--admin-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .admin-input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: rgba(255,255,255,0.04);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .admin-input {
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
            outline: none;
        }

        .admin-sub-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }

        /* НИЖНИЙ ИНТЕРФЕЙСНЫЙ БЛОК */
        .bottom-hud {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 12px 16px 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 75%, rgba(0,0,0,0));
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }

        .main-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--border-glow);
            padding: 14px;
        }

        .crypto-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .crypto-card {
            background: var(--card-inner);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 10px 4px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .crypto-card .title {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .crypto-card .value {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-white);
        }

        .slider-wrapper {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .slider-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .cyber-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            outline: none;
        }

        .cyber-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent-white);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            cursor: pointer;
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(180deg, #444444 0%, #1a1a1a 100%);
            border: 1px solid #555;
            border-radius: 14px;
            padding: 14px;
            color: var(--accent-white);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .action-btn:disabled {
            background: #111;
            border-color: #222;
            color: #555;
            box-shadow: none;
            cursor: not-allowed;
        }

        .energy-bar-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 6px;
            font-size: 12px;
        }

        .energy-info {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            color: var(--accent-white);
        }

        .boost-link {
            color: var(--text-muted);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .footer-tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            background: #0a0a0a;
            border: 1px solid var(--border-glow);
            border-radius: 14px;
            padding: 4px;
        }

        .tab-item {
            text-align: center;
            color: var(--text-muted);
            font-size: 11px;
            padding: 8px 0;
            font-weight: 500;
            cursor: pointer;
            border-radius: 10px;
        }

        .tab-item.active {
            color: var(--accent-black);
            background: var(--accent-white);
            font-weight: 700;
        }

        .radar-pulse {
            animation: cyberPulse 0.8s infinite alternate;
        }
        @keyframes cyberPulse {
            from { border-color: rgba(255,255,255,0.1); }
            to { border-color: rgba(255, 255, 255, 0.6); }
        }

        .back-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 1010;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-glow);
            color: var(--text-main);
            font-size: 20px;
            display: none; 
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease;
        }

        .app-container.fullscreen-map .top-hud {
            transform: translate(-50%, -150%);
            opacity: 0;
            pointer-events: none;
        }

        .app-container.fullscreen-map .bottom-hud {
            transform: translateY(100%);
            opacity: 0;
            pointer-events: none;
        }

        .app-container.fullscreen-map .back-btn {
            display: flex;
        }

        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-inner);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 12px;
        }
        .friends-list, #historyList {
            max-height: 140px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 2px;
        }
        .friends-list::-webkit-scrollbar, #historyList::-webkit-scrollbar {
            width: 4px;
        }
        .friends-list::-webkit-scrollbar-thumb, #historyList::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }
        .friend-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .friend-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #222;
            border: 1px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 11px;
            color: #fff;
        }
        .send-energy-btn {
            background: var(--accent-white);
            color: var(--accent-black);
            border: none;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <button class="back-btn" id="backBtn">←</button>

        <div id="map"></div>

        <div class="admin-panel-popup" id="adminPanel">
            <div class="admin-panel-title">🛠️ Тест функции (Admin)</div>
            <button class="action-btn" id="adminCompleteBtn" style="background: linear-gradient(180deg, #ff453a 0%, #b3160e 100%); border-color: #ff5b52; padding: 10px; font-size: 11px;">
                ⚡ Завершить маршрут
            </button>
            
            <div class="admin-input-group">
                <span style="font-size: 10px; color: var(--text-muted); font-weight:700;">НАЧИСЛИТЬ ЭНЕРГИЮ:</span>
                <input type="text" id="adminNickInput" class="admin-input" placeholder="@username">
                <input type="number" id="adminEnergyAmount" class="admin-input" placeholder="Количество" value="100">
                <button class="admin-sub-btn" id="adminGiveEnergyBtn">Выдать энергию</button>
            </div>
        </div>

        <div class="top-hud">
            <div class="profile-row">
                <div class="user-meta">
                    <div class="avatar-frame" id="userAvatar">U</div>
                    <div>
                        <div class="user-name" id="userName">@user <span class="lvl-badge" id="roleBadge">User</span></div>
                        <div style="font-size: 11px; color: var(--text-muted);" id="rankLabel">Ранг: Пешеход</div>
                    </div>
                </div>
                <div class="right-controls">
                    <div class="wallet-selector">💎 GrandTon</div>
                    <button class="admin-toggle-btn" id="adminToggle">🛠️ Тест</button>
                </div>
            </div>
        </div>

        <div class="bottom-hud">
            
            <div id="tab-main" class="tab-panel">
                <div class="main-panel" id="hudPanel">
                    <div class="crypto-grid">
                        <div class="crypto-card">
                            <span class="title">Шаг / Тап</span>
                            <span class="value">+1.5 КМ</span>
                        </div>
                        <div class="crypto-card">
                            <span class="title">Дистанция</span>
                            <span class="value" id="hudDistance">0.0 км</span>
                        </div>
                        <div class="crypto-card">
                            <span class="title">Время</span>
                            <span class="value" id="hudTime">0 мин</span>
                        </div>
                    </div>

                    <div class="slider-wrapper">
                        <div class="slider-info">
                            <span>Радиус сканирования</span>
                            <span id="radiusLabel" style="color: var(--accent-white); font-weight: 700;">3.0 км</span>
                        </div>
                        <input type="range" id="radiusSlider" class="cyber-slider" min="500" max="5000" step="100" value="3000">
                    </div>
                </div>
                <button class="action-btn" id="generateBtn" style="margin-top: 10px;" disabled>Укажите точку центра</button>
            </div>

            <div id="tab-friends" class="tab-panel" style="display: none;">
                <div class="main-panel">
                    <div style="font-size: 13px; font-weight: 700; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px;">Ваша команда</div>
                    <div class="friends-list"></div>
                </div>
                <button class="action-btn" id="inviteBtn" style="margin-top: 10px; padding: 12px; font-size: 12px;">+ Пригласить друга</button>
            </div>

            <div id="tab-history" class="tab-panel" style="display: none;">
                <div class="main-panel">
                    <div style="font-size: 13px; font-weight: 700; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px;">История вылазок</div>
                    <div id="historyList"></div>
                </div>
            </div>

            <div class="energy-bar-row">
                <div class="energy-info">
                    <span>⚡</span>
                    <span id="energyText">200 / 200</span>
                </div>
                <div class="boost-link">🚀 Буст</div>
            </div>

            <div class="footer-tabs">
                <div class="tab-item active">🏠<br>Main</div>
                <div class="tab-item">👥<br>Friends</div>
                <div class="tab-item">📜<br>История</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioCtx();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        const haptics = {
            tap() {
                initAudio();
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(850, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.04);
            },
            success() {
                initAudio();
                const now = audioCtx.currentTime;
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(f, now + i * 0.04);
                    gain.gain.setValueAtTime(0.04, now + i * 0.04);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.04 + 0.25);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now + i * 0.04); osc.stop(now + i * 0.04 + 0.25);
                });
            }
        };

        const map = L.map('map', { 
            zoomControl: false, attributionControl: false, zoomAnimation: true, fadeAnimation: true
        }).setView([55.7558, 37.6173], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        let startMarker = null, targetMarker = null, radiusCircle = null, routeCore = null, routeGlow = null, selectedLocation = null;
        let userLocation = null, liveLocationMarker = null, initialLocationSet = false;
        let currentRadius = 3000;

        // РОЛЕВАЯ МОДЕЛЬ И СИСТЕМА ЭНЕРГИИ
        let isAdmin = false;
        let maxEnergy = 200;
        let currentEnergy = 200;

        let routeHistory = []; 
        let friendsData = [
            { name: "@alex_ton", dist: "14.2 км", active: true },
            { name: "@crypto_mario", dist: "8.5 км", active: false },
            { name: "@vlados_run", dist: "3.1 км", active: true }
        ];

        const appContainer = document.querySelector('.app-container');
        const backBtn = document.getElementById('backBtn');
        let isMapFullscreen = false;

        const generateBtn = document.getElementById('generateBtn');
        const radiusSlider = document.getElementById('radiusSlider');
        const radiusLabel = document.getElementById('radiusLabel');
        const hudDistance = document.getElementById('hudDistance');
        const hudTime = document.getElementById('hudTime');
        const hudPanel = document.getElementById('hudPanel');
        const energyText = document.getElementById('energyText');

        // Подсчет кастомной стоимости энергии: 1 энергия на 0.5 км, 0.7км = 2, 1.2км = 2
        function getEnergyCost(meters) {
            let km = meters / 1000;
            if (km <= 0.5) return 1;
            if (km <= 1.2) return 2; // Перекрывает твои примеры (0.7 и 1.2)
            return Math.ceil(km / 0.5);
        }

        function updateEnergyUI() {
            if (isAdmin) {
                energyText.innerText = "∞ / ∞";
            } else {
                energyText.innerText = `${currentEnergy} / ${maxEnergy}`;
            }
            updateButtonLabel();
        }

        function updateButtonLabel() {
            if (!selectedLocation) {
                generateBtn.innerText = "Укажите точку центра";
                return;
            }
            const cost = getEnergyCost(currentRadius);
            if (isAdmin) {
                generateBtn.innerText = "СГЕНЕРИРОВАТЬ МАРШРУТ (⚡ 0)";
            } else {
                generateBtn.innerText = `СГЕНЕРИРОВАТЬ МАРШРУТ (⚡ ${cost})`;
            }
        }

        radiusSlider.addEventListener('input', function(e) {
            currentRadius = parseInt(e.target.value);
            radiusLabel.innerText = (currentRadius / 1000).toFixed(1) + ' км';
            updateButtonLabel();
            if (radiusCircle && selectedLocation) {
                radiusCircle.setRadius(currentRadius);
                map.fitBounds(radiusCircle.getBounds(), { animate: true, duration: 0.4 });
            }
        });

        // КЛИК ПО КАРТЕ
        map.on('click', function(e) {
            haptics.tap();
            if (!isMapFullscreen) {
                appContainer.classList.add('fullscreen-map');
                isMapFullscreen = true;
                if (!selectedLocation) {
                    selectedLocation = e.latlng;
                    resetLayoutAndDrawStart();
                }
            } else {
                if (!routeCore) {
                    selectedLocation = e.latlng;
                    resetLayoutAndDrawStart();
                }
            }
        });

        backBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            haptics.tap();
            appContainer.classList.remove('fullscreen-map');
            isMapFullscreen = false;
        });

        function resetLayoutAndDrawStart() {
            if (!selectedLocation) return;
            if (startMarker) map.removeLayer(startMarker);
            if (targetMarker) map.removeLayer(targetMarker);
            if (radiusCircle) map.removeLayer(radiusCircle);
            if (routeCore) map.removeLayer(routeCore);
            if (routeGlow) map.removeLayer(routeGlow);

            startMarker = L.circleMarker(selectedLocation, {
                radius: 7, fillColor: '#000', fillOpacity: 1, color: '#fff', weight: 2
            }).addTo(map);

            radiusCircle = L.circle(selectedLocation, {
                radius: currentRadius, color: '#000', weight: 1.5, fillColor: '#000', fillOpacity: 0.03, dashArray: '4, 8'
            }).addTo(map);

            map.fitBounds(radiusCircle.getBounds(), { animate: true, duration: 0.4 });
            generateBtn.disabled = false;
            updateButtonLabel();
        }

        function getRandomPointInRadius(center, radiusInMeters) {
            const r = radiusInMeters * Math.sqrt(Math.random());
            const theta = Math.random() * 2 * Math.PI;
            const deltaLat = (r * Math.cos(theta)) / 111320;
            const deltaLng = (r * Math.sin(theta)) / (111320 * Math.cos(center.lat * Math.PI / 180));
            return { lat: center.lat + deltaLat, lng: center.lng + deltaLng };
        }

        generateBtn.addEventListener('click', async function() {
            if (!selectedLocation) return;

            const cost = getEnergyCost(currentRadius);
            if (!isAdmin && currentEnergy < cost) {
                const tg = window.Telegram ? window.Telegram.WebApp : null;
                if (tg) tg.showAlert("Недостаточно энергии для сканирования!");
                else alert("Недостаточно энергии!");
                return;
            }

            generateBtn.disabled = true;
            hudPanel.classList.add('radar-pulse');
            generateBtn.innerText = "ПОИСК ТОЧЕК...";

            if (targetMarker) map.removeLayer(targetMarker);
            if (routeCore) map.removeLayer(routeCore);
            if (routeGlow) map.removeLayer(routeGlow);

            let candidate = getRandomPointInRadius(selectedLocation, currentRadius);
            let routeStart = userLocation ? userLocation : selectedLocation;

            const routingUrl = `https://router.project-osrm.org/route/v1/walking/${routeStart.lng},${routeStart.lat};${candidate.lng},${candidate.lat}?overview=full&geometries=geojson`;
            
            let routeData = null;
            try {
                const response = await fetch(routingUrl);
                if (response.ok) routeData = await response.json();
            } catch (e) { console.error(e); }

            hudPanel.classList.remove('radar-pulse');
            generateBtn.disabled = false;
            haptics.success();

            // Списание энергии у обычных игроков
            if (!isAdmin) {
                currentEnergy -= cost;
                updateEnergyUI();
            }

            targetMarker = L.circleMarker([candidate.lat, candidate.lng], {
                radius: 9, fillColor: '#fff', fillOpacity: 1, color: '#000', weight: 3
            }).addTo(map);

            let finalDistance = "0.0 км";
            let finalTime = "0 мин";

            if (routeData && routeData.routes && routeData.routes.length > 0) {
                const route = routeData.routes[0];
                
                routeGlow = L.geoJSON(route.geometry, {
                    style: { color: '#000000', weight: 8, opacity: 0.6, lineCap: 'round', lineJoin: 'round' }
                }).addTo(map);

                routeCore = L.geoJSON(route.geometry, {
                    style: { color: '#ffffff', weight: 3, opacity: 1, lineCap: 'round', lineJoin: 'round' }
                }).addTo(map);

                finalDistance = (route.distance / 1000).toFixed(1) + ' км';
                finalTime = Math.round(route.duration / 60) + ' мин';
            } else {
                routeCore = L.polyline([routeStart, [candidate.lat, candidate.lng]], {
                    color: '#000', weight: 4, dashArray: '8, 8', opacity: 0.8
                }).addTo(map);
                
                const d = map.distance(routeStart, [candidate.lat, candidate.lng]);
                finalDistance = (d / 1000).toFixed(1) + ' км';
                finalTime = Math.round((d / 4500) * 60) + ' мин';
            }

            hudDistance.innerText = finalDistance;
            hudTime.innerText = finalTime;
            updateButtonLabel();

            routeHistory.unshift({
                timeCreated: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                distance: finalDistance,
                duration: finalTime
            });

            const bounds = L.latLngBounds([selectedLocation, [candidate.lat, candidate.lng]]);
            if (userLocation) bounds.extend(userLocation);
            map.fitBounds(bounds.pad(0.35), { animate: true, duration: 0.5 });
        });

        // ГЕОПОЗИЦИЯ
        map.locate({setView: false, watch: true, enableHighAccuracy: true});
        map.on('locationfound', function(e) {
            userLocation = e.latlng;
            if (liveLocationMarker) {
                liveLocationMarker.setLatLng(userLocation);
            } else {
                liveLocationMarker = L.circleMarker(userLocation, {
                    radius: 6, fillColor: '#ffffff', fillOpacity: 1, color: '#000000', weight: 2.5
                }).addTo(map);
            }
            if (!initialLocationSet) {
                map.setView(userLocation, 14);
                selectedLocation = userLocation;
                resetLayoutAndDrawStart();
                initialLocationSet = true;
            }
        });

        // ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
        const tabs = document.querySelectorAll('.tab-item');
        const panels = document.querySelectorAll('.tab-panel');

        tabs.forEach((tab, index) => {
            tab.addEventListener('click', () => {
                haptics.tap();
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                panels.forEach(p => p.style.display = 'none');
                panels[index].style.display = 'block';

                if (index === 1) renderFriends();
                if (index === 2) renderHistory();
            });
        });

        function renderFriends() {
            const container = document.querySelector('.friends-list');
            container.innerHTML = friendsData.map(f => `
                <div class="list-item">
                    <div class="friend-info">
                        <div class="friend-avatar">${f.name.charAt(1).toUpperCase()}</div>
                        <div>
                            <div style="font-weight: 600;">${f.name}</div>
                            <div style="color: var(--text-muted); font-size: 10px;">Всего: ${f.dist}</div>
                        </div>
                    </div>
                    <button class="send-energy-btn" onclick="sendEnergy('${f.name}')">${f.active ? '⚡ Дать' : '💤 Офф'}</button>
                </div>
            `).join('');
        }

        window.sendEnergy = function(friendName) {
            haptics.success();
            const tg = window.Telegram ? window.Telegram.WebApp : null;
            if (tg) tg.showAlert(`Вы успешно отправили +50⚡ энергии другу ${friendName}!`);
            else alert(`Вы успешно отправили +50⚡ энергии другу ${friendName}!`);
        };

        document.getElementById('inviteBtn').addEventListener('click', () => {
            haptics.tap();
            const tg = window.Telegram ? window.Telegram.WebApp : null;
            if (tg) tg.openTelegramLink('https://t.me/share/url?url=https://t.me/your_bot_username/app?startapp=ref_123&text=Эй!%20Погнали%20гулять!');
            else alert('Реферальная ссылка скопирована!');
        });

        function renderHistory() {
            const container = document.getElementById('historyList');
            if (routeHistory.length === 0) {
                container.innerHTML = `<div style="text-align: center; color: var(--text-muted); font-size: 11px; padding: 25px 0;">История вылазок пока пуста.</div>`;
                return;
            }
            container.innerHTML = routeHistory.map((h, i) => `
                <div class="list-item">
                    <div>
                        <div style="font-weight: 600;">Рандом Трек #${routeHistory.length - i}</div>
                        <div style="color: var(--text-muted); font-size: 10px;">Создан в ${h.timeCreated} • Время: ${h.duration}</div>
                    </div>
                    <div style="font-weight: 700; color: var(--accent-white); font-size: 13px;">${h.distance}</div>
                </div>
            `).join('');
        }

        // УПРАВЛЕНИЕ АДМИН-ПАНЕЛЬЮ (ТЕСТ ФУНКЦИИ)
        const adminToggle = document.getElementById('adminToggle');
        const adminPanel = document.getElementById('adminPanel');

        adminToggle.addEventListener('click', () => {
            haptics.tap();
            if (adminPanel.style.display === 'flex') {
                adminPanel.style.display = 'none';
                adminToggle.style.background = 'var(--admin-color)';
            } else {
                adminPanel.style.display = 'flex';
                adminToggle.style.background = '#fff';
                adminToggle.style.color = '#000';
            }
        });

        // Админ-функция 1: Завершить маршрут
        document.getElementById('adminCompleteBtn').addEventListener('click', () => {
            if (!routeCore) {
                alert("Нет активного маршрута для завершения!");
                return;
            }
            haptics.success();
            
            // Записываем в историю с пометкой админа
            routeHistory.unshift({
                timeCreated: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                distance: hudDistance.innerText,
                duration: hudTime.innerText + " (Админ)"
            });

            // Очищаем слои
            if (targetMarker) map.removeLayer(targetMarker);
            if (routeCore) map.removeLayer(routeCore);
            if (routeGlow) map.removeLayer(routeGlow);
            routeCore = null; routeGlow = null; targetMarker = null;

            hudDistance.innerText = "0.0 км";
            hudTime.innerText = "0 мин";
            
            generateBtn.disabled = true;
            updateButtonLabel();
            
            if (isMapFullscreen) {
                appContainer.classList.remove('fullscreen-map');
                isMapFullscreen = false;
            }

            adminPanel.style.display = 'none';
            adminToggle.style.background = 'var(--admin-color)';
            adminToggle.style.color = '#fff';

            const tg = window.Telegram ? window.Telegram.WebApp : null;
            if (tg) tg.showAlert("Маршрут успешно завершен администратором и сохранен в историю!");
            else alert("Маршрут завершен!");
        });

        // Админ-функция 2: Выдать энергию по нику
        document.getElementById('adminGiveEnergyBtn').addEventListener('click', () => {
            const nick = document.getElementById('adminNickInput').value.trim();
            const amount = document.getElementById('adminEnergyAmount').value.trim();
            
            if (!nick) {
                alert("Введите никнейм пользователя!");
                return;
            }
            haptics.success();
            
            const msg = `Команда выполнена! Начислено ⚡ ${amount || 100} энергии пользователю ${nick}`;
            const tg = window.Telegram ? window.Telegram.WebApp : null;
            if (tg) tg.showAlert(msg);
            else alert(msg);

            document.getElementById('adminNickInput').value = "";
            adminPanel.style.display = 'none';
            adminToggle.style.background = 'var(--admin-color)';
            adminToggle.style.color = '#fff';
        });

        // АКТИВАЦИЯ РОЛИ И ИНТЕГРАЦИЯ С TELEGRAM
        function activateAdminMode() {
            isAdmin = true;
            currentEnergy = Infinity;
            maxEnergy = Infinity;
            document.getElementById('roleBadge').innerText = "Creator";
            document.getElementById('roleBadge').style.background = 'var(--admin-color)';
            document.getElementById('roleBadge').style.color = '#fff';
            document.getElementById('rankLabel').innerText = "Ранг: Разработчик";
            adminToggle.style.display = 'block';
            updateEnergyUI();
        }

        // Пасхалка для тестирования в браузере (3 клика на аватарку включают Админа)
        let devClicks = 0;
        document.getElementById('userAvatar').addEventListener('click', () => {
            devClicks++;
            if (devClicks === 3 && !isAdmin) {
                activateAdminMode();
                alert("Лаборатория Создателя активирована (Режим разработчика)!");
            }
        });

        const tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg) {
            tg.ready();
            tg.expand();
            
            const user = tg.initDataUnsafe ? tg.initDataUnsafe.user : null;
            if (user) {
                const username = user.username ? '@' + user.username : `${user.first_name || 'User'}`;
                document.getElementById('userName').innerHTML = `${username} <span class="lvl-badge" id="roleBadge">User</span>`;
                
                const firstLetter = user.first_name ? user.first_name.charAt(0).toUpperCase() : 'U';
                document.getElementById('userAvatar').innerText = firstLetter;

                // Проверка на твой ник админа
                if (user.username === 'kirushapross') {
                    activateAdminMode();
                } else {
                    updateEnergyUI();
                }
            } else {
                updateEnergyUI();
            }
        } else {
            updateEnergyUI();
        }
    </script>
</body>
</html>
