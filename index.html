<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo Walk App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            --bg-color: #F3F5F9; /* Нежный серо-голубой фон как на картинке */
            --card-bg: #FFFFFF;
            --primary-purple: #4A3AFF; /* Фирменный глубокий индиго */
            --accent-cyan: #00F0FF;
            --text-dark: #0F172A; /* Насыщенный темный для заголовков */
            --text-muted: #64748B; /* Мягкий серый для подписей */
            --shadow-sm: 0 4px 12px rgba(74, 58, 255, 0.03);
            --shadow-md: 0 10px 30px rgba(15, 23, 42, 0.04);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 100vh;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        /* Верхняя панель профиля */
        .header-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }

        .profile-box {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar-frame {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #FFFFFF;
            box-shadow: 0 4px 10px rgba(74, 58, 255, 0.15);
        }

        .profile-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .user-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-dark);
            margin: 0;
        }

        /* Эффект переливающегося никнейма для VIP */
        .vip-nick {
            background: linear-gradient(270deg, #ff007f, #4a3aff, #00f0ff, #ff007f);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: vipFlow 3s ease infinite;
            font-weight: 800;
        }

        @keyframes vipFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .user-status {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Метка текущей версии приложения */
        .app-version {
            background: #EBEFF8;
            color: var(--primary-purple);
            font-size: 11px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 100px;
            letter-spacing: 0.5px;
        }

        /* Главная карточка управления */
        .main-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 24px;
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin: 0;
            color: var(--text-dark);
        }

        .radius-display {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary-purple);
            background: #F0EEFF;
            padding: 4px 12px;
            border-radius: 12px;
        }

        /* Премиальный кастомный слайдер радиуса */
        .slider-wrapper {
            padding: 8px 0;
            position: relative;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            border-radius: 20px;
            /* Динамический градиент инжектируется через JS */
            background: #E2E8F0; 
            outline: none;
            margin: 0;
            cursor: pointer;
        }

        /* Стилизация ползунка (Thumb) */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #FFFFFF;
            border: 4.5px solid var(--primary-purple);
            box-shadow: 0 4px 12px rgba(74, 58, 255, 0.3);
            cursor: pointer;
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(0.95);
            background: var(--primary-purple);
            border-color: #FFFFFF;
        }

        /* Кнопка в стиле "Ongoing" задач с макета */
        .action-button {
            background: var(--primary-purple);
            color: #FFFFFF;
            border: none;
            padding: 16px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(74, 58, 255, 0.2);
            transition: all 0.2s ease;
        }

        .action-button:active {
            transform: scale(0.97);
            box-shadow: 0 3px 10px rgba(74, 58, 255, 0.1);
        }

        /* Информационная панель логов */
        .log-panel {
            background: #F8FAFC;
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            border-left: 3px solid var(--primary-purple);
        }

        /* Блок интерактивной карты */
        .map-wrapper {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 10px;
            box-shadow: var(--shadow-md);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-height: 340px;
        }

        #map {
            width: 100%;
            height: 100%;
            border-radius: 24px;
            flex-grow: 1;
            z-index: 1;
            /* Делаем карту чуть мягче по цветам под интерфейс приложения */
            filter: grayscale(8%) contrast(96%) saturate(104%);
        }

        /* Кастомная стильная неоновая точка цели */
        .target-glow-marker {
            background: #FF007F;
            border: 2.5px solid #FFFFFF;
            border-radius: 50%;
            box-shadow: 0 0 15px #FF007F, 0 0 5px rgba(255, 0, 127, 0.5);
        }
    </style>
</head>
<body>

    <div class="header-card">
        <div class="profile-box">
            <div class="avatar-frame">
                <img id="user-avatar" class="avatar" src="https://ui-avatars.com/api/?name=Guest&background=EBEFF8&color=4A3AFF" alt="Avatar">
            </div>
            <div class="profile-meta">
                <h4 id="user-name" class="user-title">Гость</h4>
                <span id="user-status" class="user-status">Браузерная сессия</span>
            </div>
        </div>
        <div class="app-version">v1.2.0</div>
    </div>

    <div class="main-card">
        <div class="section-header">
            <h3 class="section-title">Радиус поиска</h3>
            <span id="radius-val" class="radius-display">500 м</span>
        </div>
        
        <div class="slider-wrapper">
            <input type="range" id="radius-slider" min="100" max="3000" step="50" value="500">
        </div>

        <button class="action-button" id="btn-generate">Сгенерировать случайную точку</button>
        
        <div class="log-panel" id="status-text">
            Установите центр зоны кликом по карте или разрешите доступ к GPS устройства.
        </div>
    </div>

    <div class="map-wrapper">
        <div id="map"></div>
    </div>

    <script>
        let map, centerMarker, targetMarker, searchCircle;
        let centerCoords = [55.7558, 37.6173]; // Москва по дефолту
        let currentRadius = 500;

        document.addEventListener("DOMContentLoaded", () => {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            setupProfile(tg);
            initMap();
            setupControls();
            tryGeolocation();
        });

        function setupProfile(tg) {
            const nameElem = document.getElementById("user-name");
            const avatarElem = document.getElementById("user-avatar");
            const statusElem = document.getElementById("user-status");

            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                const user = tg.initDataUnsafe.user;
                nameElem.textContent = user.first_name;
                
                if (user.photo_url) {
                    avatarElem.src = user.photo_url;
                } else {
                    avatarElem.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.first_name)}&background=4A3AFF&color=fff`;
                }

                if (user.id === 5434932796 || (user.username && user.username.toLowerCase() === "kirushapross")) {
                    nameElem.classList.add("vip-nick");
                    statusElem.textContent = "VIP Доступ";
                    statusElem.style.color = "#FF007F";
                    statusElem.style.fontWeight = "600";
                } else {
                    statusElem.textContent = "Telegram Клиент";
                }
            }
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView(centerCoords, 14);
            
            // Чистые и стильные тайлы Voyager от CartoDB под тон макета
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            centerMarker = L.marker(centerCoords, { draggable: true }).addTo(map);
            searchCircle = L.circle(centerCoords, {
                radius: currentRadius,
                color: '#4A3AFF',
                fillColor: '#4A3AFF',
                fillOpacity: 0.08,
                weight: 2.5
            }).addTo(map);

            centerMarker.on('drag', (e) => {
                centerCoords = [e.latlng.lat, e.latlng.lng];
                searchCircle.setLatLng(e.latlng);
            });
        }

        function updateSliderFill(slider) {
            const percentage = (slider.value - slider.min) / (slider.max - slider.min) * 100;
            slider.style.background = `linear-gradient(to right, var(--primary-purple) 0%, var(--primary-purple) ${percentage}%, #E2E8F0 ${percentage}%, #E2E8F0 100%)`;
        }

        function setupControls() {
            const slider = document.getElementById("radius-slider");
            const radiusVal = document.getElementById("radius-val");
            const btnGenerate = document.getElementById("btn-generate");

            // Первичная инициализация закраски трека
            updateSliderFill(slider);

            slider.addEventListener("input", (e) => {
                currentRadius = parseInt(e.target.value);
                radiusVal.textContent = currentRadius >= 1000 ? `${(currentRadius/1000).toFixed(1)} км` : `${currentRadius} м`;
                searchCircle.setRadius(currentRadius);
                updateSliderFill(e.target);
            });

            map.on('click', (e) => {
                centerCoords = [e.latlng.lat, e.latlng.lng];
                centerMarker.setLatLng(e.latlng);
                searchCircle.setLatLng(e.latlng);
            });

            btnGenerate.addEventListener("click", generateValidPoint);
        }

        function tryGeolocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    centerCoords = [pos.coords.latitude, pos.coords.longitude];
                    map.setView(centerCoords, 14);
                    centerMarker.setLatLng(centerCoords);
                    searchCircle.setLatLng(centerCoords);
                    document.getElementById("status-text").textContent = "Локация успешно синхронизирована по GPS.";
                }, () => {
                    document.getElementById("status-text").textContent = "Доступ к GPS отклонен. Используйте ручной выбор на карте.";
                });
            }
        }

        function getRandomPointInCircle(lat, lng, radiusMeters) {
            const r = (radiusMeters / 111320) * Math.sqrt(Math.random());
            const theta = Math.random() * 2 * Math.PI;
            const randomLat = lat + r * Math.cos(theta);
            const randomLng = lng + r * Math.sin(theta) / Math.cos(lat * Math.PI / 180);
            return { lat: randomLat, lng: randomLng };
        }

        async function checkPointSafety(lat, lng) {
            const query = `[out:json];(node(around:15,${lat},${lng});way(around:15,${lat},${lng}););out tags;`;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) return true;
                
                const data = await response.json();
                for (let element of data.elements) {
                    if (element.tags) {
                        if (element.tags.building && element.tags.building !== 'no') return false;
                        if (element.tags.natural === 'water' || element.tags.waterway || element.tags.landuse === 'reservoir') return false;
                    }
                }
                return true;
            } catch (e) {
                return true; 
            }
        }

        async function generateValidPoint() {
            const statusBox = document.getElementById("status-text");
            statusBox.innerHTML = "⏳ Проверяем местность на наличие построек и воды...";
            
            let attempts = 0;
            let validPoint = null;
            const maxAttempts = 15;

            while (attempts < maxAttempts) {
                let candidate = getRandomPointInCircle(centerCoords[0], centerCoords[1], currentRadius);
                let isSafe = await checkPointSafety(candidate.lat, candidate.lng);
                
                if (isSafe) {
                    validPoint = candidate;
                    break;
                }
                attempts++;
            }

            if (validPoint) {
                if (targetMarker) map.removeLayer(targetMarker);

                const neonIcon = L.divIcon({
                    className: 'target-glow-marker',
                    iconSize: [16, 16]
                });

                targetMarker = L.marker([validPoint.lat, validPoint.lng], { icon: neonIcon }).addTo(map);
                map.panTo([validPoint.lat, validPoint.lng]);

                statusBox.innerHTML = `🎯 Точка определена (Попыток: ${attempts + 1})!<br>Координаты: ${validPoint.lat.toFixed(5)}, ${validPoint.lng.toFixed(5)}`;
            } else {
                statusBox.innerHTML = "❌ В выбранном радиусе слишком плотная застройка или вода. Попробуйте расширить радиус поиска.";
            }
        }
    </script>
</body>
</html>
