<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoRandomizer - Grand Combat Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --font-apple: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            --bg-space: #050811;
            --panel-bg: rgba(11, 17, 32, 0.82);
            --card-inner: rgba(20, 31, 56, 0.65);
            --border-glow: rgba(255, 255, 255, 0.08);
            --neon-blue: #007AFF;
            --neon-cyan: #00f0ff;
            --neon-gold: #ffb800;
            --text-main: #ffffff;
            --text-muted: #7d8ca3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: var(--font-apple);
            background-color: #020408;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Адаптация под жесткий формат 9:16 */
        .app-container {
            width: 100%;
            max-width: 430px; /* Стандартная ширина iPhone Pro Max */
            height: 100%;
            max-height: 932px;
            position: relative;
            background: var(--bg-space);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        /* Для десктопов делаем красивую рамку телефона */
        @media (min-width: 440px) {
            .app-container {
                height: 90vh;
                border-radius: 40px;
                border: 4px solid #1a2436;
            }
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Премиальный глубокий темный фильтр для карты */
        .leaflet-layer {
            filter: invert(100%) hue-rotate(200deg) brightness(40%) contrast(125%) saturate(70%);
        }

        /* ВЕРХНИЙ БЛОК: Профиль пользователя в стиле GrandCombat */
        .top-hud {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            z-index: 1000;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .profile-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-meta {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar-frame {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 2px solid var(--neon-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 0 10px rgba(0,122,255,0.4);
        }

        .user-name {
            font-size: 14px;
            font-weight: 600;
        }

        .lvl-badge {
            font-size: 11px;
            color: var(--neon-gold);
            background: rgba(255, 184, 0, 0.1);
            padding: 1px 6px;
            border-radius: 6px;
            font-weight: 600;
        }

        .wallet-selector {
            background: var(--card-inner);
            border: 1px solid var(--border-glow);
            padding: 6px 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        /* НИЖНИЙ ИНТЕРФЕЙСНЫЙ БЛОК */
        .bottom-hud {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: linear-gradient(to top, #04060c 85%, rgba(4,6,12,0));
        }

        .main-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            border: 1px solid var(--border-glow);
            padding: 16px;
        }

        /* Тройные карточки как "Earn for tap / Profit per hour" */
        .crypto-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 14px;
        }

        .crypto-card {
            background: var(--card-inner);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 14px;
            padding: 10px 4px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .crypto-card .title {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }

        .crypto-card .value {
            font-size: 13px;
            font-weight: 700;
            color: var(--neon-cyan);
        }

        /* Ползунок радиуса */
        .slider-wrapper {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .slider-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .cyber-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            outline: none;
        }

        .cyber-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--neon-cyan);
            box-shadow: 0 0 8px var(--neon-cyan);
            cursor: pointer;
        }

        /* Кнопка CONFIRM в стиле GrandCombat */
        .action-btn {
            width: 100%;
            background: linear-gradient(180deg, #2563eb 0%, #1d4ed8 100%);
            border: none;
            border-radius: 16px;
            padding: 15px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4), inset 0 1px 0 rgba(255,255,255,0.3);
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .action-btn:disabled {
            background: #151c2c;
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Индикатор энергии (⚡ 928 / 1000) */
        .energy-bar-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
            font-size: 13px;
        }

        .energy-info {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 600;
        }

        .boost-link {
            color: var(--neon-gold);
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Нижнее меню вкладок */
        .footer-tabs {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            background: #090d16;
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 4px;
        }

        .tab-item {
            text-align: center;
            color: var(--text-muted);
            font-size: 10px;
            padding: 6px 0;
            font-weight: 500;
            cursor: pointer;
        }

        .tab-item.active {
            color: var(--neon-blue);
            background: rgba(0, 122, 255, 0.07);
            border-radius: 12px;
        }

        /* Пульсация во время обработки */
        .radar-pulse {
            animation: cyberPulse 0.8s infinite alternate;
        }
        @keyframes cyberPulse {
            from { border-color: rgba(255,255,255,0.08); }
            to { border-color: rgba(0, 240, 255, 0.5); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="map"></div>

        <div class="top-hud">
            <div class="profile-row">
                <div class="user-meta">
                    <div class="avatar-frame">U</div>
                    <div>
                        <div class="user-name">User Walk <span class="lvl-badge">Pro</span></div>
                        <div style="font-size: 11px; color: var(--text-muted);">Ранг: Разведчик</div>
                    </div>
                </div>
                <div class="wallet-selector">
                    <span>💎 GrandTon</span>
                    <span style="font-size: 10px; color: var(--text-muted);">▼</span>
                </div>
            </div>
        </div>

        <div class="bottom-hud">
            <div class="main-panel" id="hudPanel">
                
                <div class="crypto-grid">
                    <div class="crypto-card">
                        <span class="title">Шаг / Тап</span>
                        <span class="value">+1.5 КМ</span>
                    </div>
                    <div class="crypto-card" style="border-color: rgba(0, 240, 255, 0.2);">
                        <span class="title">Дистанция</span>
                        <span class="value" id="hudDistance">0.0 км</span>
                    </div>
                    <div class="crypto-card">
                        <span class="title">Награда</span>
                        <span class="value" id="hudTime">0 мин</span>
                    </div>
                </div>

                <div class="slider-wrapper">
                    <div class="slider-info">
                        <span>Радиус сканирования</span>
                        <span id="radiusLabel" style="color: var(--neon-cyan); font-weight: 700;">3.0 км</span>
                    </div>
                    <input type="range" id="radiusSlider" class="cyber-slider" min="500" max="5000" step="100" value="3000">
                </div>
            </div>

            <button class="action-btn" id="generateBtn" disabled>Укажите точку старта</button>

            <div class="energy-bar-row">
                <div class="energy-info">
                    <span>⚡</span>
                    <span>928 / 1000</span>
                </div>
                <div class="boost-link">🚀 Буст</div>
            </div>

            <div class="footer-tabs">
                <div class="tab-item active">🏠<br>Main</div>
                <div class="tab-item">⛏️<br>Mine</div>
                <div class="tab-item">👥<br>Friends</div>
                <div class="tab-item">💰<br>Earn</div>
                <div class="tab-item">📊<br>Stats</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioCtx();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        const haptics = {
            tap() {
                initAudio();
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(850, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.04);
            },
            success() {
                initAudio();
                const now = audioCtx.currentTime;
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(f, now + i * 0.04);
                    gain.gain.setValueAtTime(0.04, now + i * 0.04);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.04 + 0.25);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now + i * 0.04); osc.stop(now + i * 0.04 + 0.25);
                });
            }
        };

        // Карта
        const map = L.map('map', { 
            zoomControl: false, attributionControl: false, zoomAnimation: true, fadeAnimation: true
        }).setView([55.7558, 37.6173], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

        let startMarker = null, targetMarker = null, radiusCircle = null, routeCore = null, routeGlow = null, selectedLocation = null;
        let currentRadius = 3000;

        const generateBtn = document.getElementById('generateBtn');
        const radiusSlider = document.getElementById('radiusSlider');
        const radiusLabel = document.getElementById('radiusLabel');
        const hudDistance = document.getElementById('hudDistance');
        const hudTime = document.getElementById('hudTime');
        const hudPanel = document.getElementById('hudPanel');

        radiusSlider.addEventListener('input', function(e) {
            currentRadius = parseInt(e.target.value);
            radiusLabel.innerText = (currentRadius / 1000).toFixed(1) + ' км';
            if (radiusCircle && selectedLocation) {
                radiusCircle.setRadius(currentRadius);
                map.fitBounds(radiusCircle.getBounds(), { animate: true, duration: 0.4 });
            }
        });

        map.on('click', function(e) {
            haptics.tap();
            selectedLocation = e.latlng;
            resetLayoutAndDrawStart();
        });

        function resetLayoutAndDrawStart() {
            if (!selectedLocation) return;
            if (startMarker) map.removeLayer(startMarker);
            if (targetMarker) map.removeLayer(targetMarker);
            if (radiusCircle) map.removeLayer(radiusCircle);
            if (routeCore) map.removeLayer(routeCore);
            if (routeGlow) map.removeLayer(routeGlow);

            startMarker = L.circleMarker(selectedLocation, {
                radius: 7, fillColor: '#007AFF', fillOpacity: 1, color: '#fff', weight: 2
            }).addTo(map);

            radiusCircle = L.circle(selectedLocation, {
                radius: currentRadius, color: '#00f0ff', weight: 1, fillColor: '#007AFF', fillOpacity: 0.01, dashArray: '4, 8'
            }).addTo(map);

            map.fitBounds(radiusCircle.getBounds(), { animate: true, duration: 0.4 });
            generateBtn.disabled = false;
            generateBtn.innerText = "СГЕНЕРИРОВАТЬ МАРШРУТ";
        }

        function getRandomPointInRadius(center, radiusInMeters) {
            const r = radiusInMeters * Math.sqrt(Math.random());
            const theta = Math.random() * 2 * Math.PI;
            const deltaLat = (r * Math.cos(theta)) / 111320;
            const deltaLng = (r * Math.sin(theta)) / (111320 * Math.cos(center.lat * Math.PI / 180));
            return { lat: center.lat + deltaLat, lng: center.lng + deltaLng };
        }

        generateBtn.addEventListener('click', async function() {
            if (!selectedLocation) return;

            generateBtn.disabled = true;
            hudPanel.classList.add('radar-pulse');
            generateBtn.innerText = "ПОИСК КРИПТО-ТОЧЕК...";

            if (targetMarker) map.removeLayer(targetMarker);
            if (routeCore) map.removeLayer(routeCore);
            if (routeGlow) map.removeLayer(routeGlow);

            let candidate = getRandomPointInRadius(selectedLocation, currentRadius);

            // Оптимизированный OSRM роутинг (без зависаний Overpass)
            const routingUrl = `https://router.project-osrm.org/route/v1/walking/${selectedLocation.lng},${selectedLocation.lat};${candidate.lng},${candidate.lat}?overview=full&geometries=geojson`;
            
            let routeData = null;
            try {
                const response = await fetch(routingUrl);
                if (response.ok) routeData = await response.json();
            } catch (e) { console.error(e); }

            hudPanel.classList.remove('radar-pulse');
            generateBtn.disabled = false;
            generateBtn.innerText = "СГЕНЕРИРОВАТЬ МАРШРУТ";
            haptics.success();

            targetMarker = L.circleMarker([candidate.lat, candidate.lng], {
                radius: 9, fillColor: '#FF3B30', fillOpacity: 1, color: '#fff', weight: 2
            }).addTo(map);

            if (routeData && routeData.routes && routeData.routes.length > 0) {
                const route = routeData.routes[0];
                
                // ВАУ-ЭФФЕКТ: Рендеринг красивой двухслойной неоновой линии пути
                // Слой 1: Широкое неоновое размытое облако (Glow)
                routeGlow = L.geoJSON(route.geometry, {
                    style: { color: '#00f0ff', weight: 10, opacity: 0.35, lineCap: 'round', lineJoin: 'round' }
                }).addTo(map);

                // Слой 2: Яркое контрастное белое ядро луча (Core)
                routeCore = L.geoJSON(route.geometry, {
                    style: { color: '#ffffff', weight: 3, opacity: 0.95, lineCap: 'round', lineJoin: 'round' }
                }).addTo(map);

                hudDistance.innerText = (route.distance / 1000).toFixed(1) + ' км';
                hudTime.innerText = Math.round(route.duration / 60) + ' мин';
            } else {
                // Если API лег, чертим неоновый пунктир направления
                routeCore = L.polyline([selectedLocation, [candidate.lat, candidate.lng]], {
                    color: '#00f0ff', weight: 3, dashArray: '6, 6', opacity: 0.8
                }).addTo(map);
                
                const d = map.distance(selectedLocation, [candidate.lat, candidate.lng]);
                hudDistance.innerText = (d / 1000).toFixed(1) + ' км';
                hudTime.innerText = Math.round((d / 4500) * 60) + ' мин';
            }

            const boundsGroup = new L.featureGroup([startMarker, targetMarker]);
            map.fitBounds(boundsGroup.getBounds().pad(0.35), { animate: true, duration: 0.5 });
        });

        // Геолокация на старте
        map.locate({setView: true, maxZoom: 14});
        map.on('locationfound', function(e) {
            selectedLocation = e.latlng;
            resetLayoutAndDrawStart();
        });
    </script>
</body>
</html>
