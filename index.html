<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo Walk App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #1a1a1a);
            color: var(--tg-theme-text-color, #ffffff);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        .profile-card {
            background-color: var(--tg-theme-secondary-bg-color, #2d2d2d);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            width: 80%;
            max-width: 350px;
        }

        .avatar-container {
            margin-bottom: 15px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--tg-theme-button-color, #2481cc);
            background-color: #444;
        }

        .username {
            font-size: 22px;
            font-weight: bold;
            margin: 10px 0 5px 0;
        }

        /* Анимация переливающегося ника для VIP */
        .vip-nick {
            background: linear-gradient(270deg, #ff007f, #7f00ff, #00f0ff, #ff007f);
            background-size: 600% 600%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: vipShimmer 4s ease infinite;
            font-weight: 900;
        }

        @keyframes vipShimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .status-badge {
            font-size: 14px;
            padding: 5px 12px;
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.1);
            display: inline-block;
            margin-top: 5px;
            color: #aaa;
        }

        .vip-badge {
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            color: #fff;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(255, 0, 127, 0.4);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-container">
            <img id="user-avatar" class="avatar" src="https://ui-avatars.com/api/?name=Guest&background=444&color=fff" alt="Avatar">
        </div>
        <div id="user-name" class="username">Загрузка...</div>
        <div id="user-status" class="status-badge">Определение...</div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand(); // Разворачиваем приложение на весь экран телефона

            // Данные по умолчанию (если зашли через обычный браузер)
            let userData = {
                id: null,
                username: "",
                first_name: "Гость",
                photo_url: "https://ui-avatars.com/api/?name=Guest&background=444&color=fff"
            };

            // Проверяем, открыто ли приложение внутри Telegram
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                const tgUser = tg.initDataUnsafe.user;
                userData.id = tgUser.id;
                userData.username = tgUser.username || "";
                userData.first_name = tgUser.first_name + (tgUser.last_name ? " " + tgUser.last_name : "");
                
                // Если у пользователя есть аватарка в TG
                if (tgUser.photo_url) {
                    userData.photo_url = tgUser.photo_url;
                } else {
                    userData.photo_url = `https://ui-avatars.com/api/?name=${encodeURIComponent(tgUser.first_name)}&background=2481cc&color=fff`;
                }
            }

            // Сразу выводим базовые данные (чтобы интерфейс не мигал)
            const nameElem = document.getElementById("user-name");
            const avatarElem = document.getElementById("user-avatar");
            const statusElem = document.getElementById("user-status");

            nameElem.textContent = userData.first_name;
            avatarElem.src = userData.photo_url;

            // Если это просто гость из браузера
            if (!userData.id) {
                statusElem.textContent = "Браузерный гость";
                return;
            }

            // Отправляем данные на твой сервер Render для проверки VIP и сохранения в БД
            try {
                const response = await fetch("https://geo-walk-app.onrender.com/api/user", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(userData)
                });

                if (response.ok) {
                    const result = await response.json();
                    
                    // Если сервер подтвердил VIP статус
                    if (result.is_vip) {
                        nameElem.classList.add("vip-nick");
                        statusElem.textContent = "VIP Пользователь";
                        statusElem.classList.add("vip-badge");
                    } else {
                        statusElem.textContent = "Пользователь";
                    }
                } else {
                    statusElem.textContent = "Ошибка сервера";
                }
            } catch (error) {
                console.error("Ошибка при запросе к бэкенду:", error);
                // Резервный локальный метод проверки (если сервер временно «спит» на Render)
                if (userData.id === 5434932796 || userData.username.toLowerCase() === "kirushapross") {
                    nameElem.classList.add("vip-nick");
                    statusElem.textContent = "VIP (Резерв)";
                    statusElem.classList.add("vip-badge");
                } else {
                    statusElem.textContent = "Офлайн-режим";
                }
            }
        });
    </script>
</body>
</html>
