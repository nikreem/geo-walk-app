<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geo Walk App</title>
    <!-- Telegram Web App API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Карта Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            /* Жидкое стекло: базовые полупрозрачные цвета и размытие */
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: 1px solid rgba(255, 255, 255, 0.5);
            --glass-blur: blur(25px) saturate(190%);
            
            /* Серые полупрозрачные кнопки в стиле Apple */
            --apple-grey-btn: rgba(120, 120, 128, 0.14);
            --apple-grey-btn-hover: rgba(120, 120, 128, 0.22);
            --apple-grey-btn-active: rgba(120, 120, 128, 0.32);
            
            --text-dark: #1C1C1E; 
            --text-muted: #66666D; 
            --primary-purple: #5856D6;
            --shadow-glass: 0 8px 32px 0 rgba(31, 38, 135, 0.04), inset 0 1px 1px rgba(255, 255, 255, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            /* Живой переливающийся жидкий фон для проявления эффекта стекла */
            background: linear-gradient(135deg, #E2E8F0 0%, #FCE7F3 35%, #EFF6FF 70%, #F5F3FF 100%);
            background-size: 400% 400%;
            animation: liquidBackground 18s ease infinite;
            
            color: var(--text-dark);
            margin: 0 auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100vh;
            max-height: 100vh;
            max-width: 500px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        @keyframes liquidBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Общие правила для стеклянных контейнеров */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: var(--glass-border);
            box-shadow: var(--shadow-glass);
        }

        /* Шапка профиля */
        .header-card {
            border-radius: 20px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .profile-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid rgba(255, 255, 255, 0.6);
        }

        .profile-meta {
            display: flex;
            flex-direction: column;
        }

        .user-title {
            font-size: 14px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.2px;
        }

        .vip-nick {
            background: linear-gradient(270deg, #FF2D55, #5856D6, #007AFF, #FF2D55);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: vipFlow 3s ease infinite;
            font-weight: 800;
        }

        @keyframes vipFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .coin-badge {
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            color: #BF953F;
            font-weight: 800;
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .app-version {
            color: var(--text-muted);
            font-size: 9px;
            font-weight: 600;
            margin-top: 2px;
        }

        /* Навигационные вкладки */
        .app-tabs {
            display: flex;
            background: rgba(120, 120, 128, 0.1);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            padding: 3px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            gap: 2px;
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            border: none;
            background: transparent;
            padding: 9px 4px;
            border-radius: 13px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.7);
            color: var(--text-dark);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        /* Экраны приложения */
        .view-section {
            display: none;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
            overflow: hidden;
        }

        .view-section.active {
            display: flex;
        }

        /* Главная карточка управления */
        .main-card {
            border-radius: 24px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex-shrink: 0;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            margin: 0;
        }

        .radius-display {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dark);
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 3px 9px;
            border-radius: 9px;
        }

        /* Ползунок Слайдера */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 10px;
            background: rgba(120, 120, 128, 0.15); 
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #FFFFFF;
            border: 0.5px solid rgba(0,0,0,0.15);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.15);
        }

        .energy-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: rgba(255, 255, 255, 0.25);
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .energy-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 700;
        }

        .energy-timer {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .energy-bar-bg {
            background: rgba(120, 120, 128, 0.12);
            height: 6px;
            border-radius: 10px;
            overflow: hidden;
        }

        .energy-bar-fill {
            background: linear-gradient(90deg, #34D399, #10B981);
            height: 100%;
            width: 100%;
            transition: width 0.3s;
        }

        /* СЕРЫЕ ПОЛУПРОЗРАЧНЫЕ КНОПКИ APPLE STYLE */
        .action-button {
            background: var(--apple-grey-btn);
            color: var(--text-dark);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 14px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, border-color 0.2s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .action-button:hover {
            background: var(--apple-grey-btn-hover);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .action-button:active {
            background: var(--apple-grey-btn-active);
            transform: scale(0.98);
        }

        .action-button:disabled {
            background: rgba(120, 120, 128, 0.05);
            color: var(--text-muted);
            border-color: transparent;
            cursor: not-allowed;
            transform: none;
        }

        .log-panel {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 8px 14px;
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.4;
            border-left: 3px solid rgba(120, 120, 128, 0.3);
        }

        .map-wrapper {
            border-radius: 26px;
            padding: 6px;
            flex-grow: 1; 
            display: flex;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            z-index: 1;
        }

        /* Магазин скинов */
        .shop-subtabs {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .subtab-btn {
            background: rgba(120, 120, 128, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 7px 14px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .subtab-btn.active {
            background: rgba(255, 255, 255, 0.6);
            color: var(--text-dark);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .skins-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            overflow-y: auto; 
            padding-bottom: 20px;
            flex-grow: 1;
        }

        .skin-card {
            border-radius: 20px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .skin-card.applied {
            border-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.65);
        }

        .skin-rarity {
            position: absolute;
            top: 6px;
            left: 6px;
            font-size: 8px;
            font-weight: 800;
            padding: 2px 7px;
            border-radius: 100px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .rarity-epic { background: rgba(219, 39, 119, 0.12); color: #DB2777; }
        .rarity-legend { background: rgba(217, 119, 6, 0.12); color: #D97706; }
        .rarity-rare { background: rgba(5, 150, 105, 0.12); color: #059669; }

        .skin-preview-box {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 8px;
        }

        .skin-name {
            font-size: 12px;
            font-weight: 700;
        }

        .skin-btn {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 7px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            background: var(--apple-grey-btn);
            color: var(--text-dark);
            transition: all 0.2s;
        }

        .skin-btn.buy {
            background: rgba(191, 149, 63, 0.12);
            color: #A37A2C;
            border-color: rgba(191, 149, 63, 0.2);
        }

        .skin-btn.active-skin {
            background: rgba(255, 255, 255, 0.8);
            color: #000000;
            border-color: rgba(255, 255, 255, 0.9);
        }

        /* ЭКРАН: КОЛЕСО ФОРТУНЫ */
        .wheel-view-container {
            border-radius: 26px;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 22px;
            flex-grow: 1;
        }

        .wheel-wrapper {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 10px 0;
        }

        /* Премиальная неоновая розовая стрелка Apple */
        .wheel-pointer {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            width: 26px;
            height: 26px;
            background: linear-gradient(135deg, #FF2D55, #FF3B30);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
            filter: drop-shadow(0px 4px 8px rgba(255, 45, 85, 0.4));
        }

        .wheel-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #1C1C1E;
            box-shadow: 0 14px 35px rgba(0, 0, 0, 0.15);
            /* Мягкие, дорогие градиенты секторов в палитре Apple */
            background: conic-gradient(
                #5856D6 0deg 60deg,
                #AF52DE 60deg 120deg,
                #34A853 120deg 180deg,
                #007AFF 180deg 240deg,
                #FF9500 240deg 300deg,
                #FF2D55 300deg 360deg
            );
            position: relative;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
        }

        .wheel-center-cap {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 44px;
            height: 44px;
            background: #1C1C1E;
            border: 4px solid #FFFFFF;
            border-radius: 50%;
            z-index: 6;
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .wheel-label {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 34px;
            margin-left: -40px;
            margin-top: -17px;
            text-align: center;
            font-weight: 800;
            color: #FFFFFF;
            transform-origin: center center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            line-height: 1.1;
        }
        
        .wl-num {
            font-size: 16px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .wl-txt {
            font-size: 7px;
            font-weight: 700;
            opacity: 0.9;
            letter-spacing: 0.5px;
        }

        .wl-0 { transform: rotate(30deg) translateY(-95px); }
        .wl-1 { transform: rotate(90deg) translateY(-95px); }
        .wl-2 { transform: rotate(150deg) translateY(-95px); }
        .wl-3 { transform: rotate(210deg) translateY(-95px); }
        .wl-4 { transform: rotate(270deg) translateY(-95px); }
        .wl-5 { transform: rotate(330deg) translateY(-95px); }

        .wheel-status-text {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-align: center;
            min-height: 38px;
            padding: 0 12px;
            line-height: 1.4;
        }

        /* Премиальные эффекты карт */
        .map-beige-filter {
            filter: sepia(0.55) hue-rotate(-10deg) saturate(120%) contrast(96%) brightness(102%) !important;
        }

        @keyframes rgbPegman {
            0% { fill: #FF0000; } 20% { fill: #00FF00; } 40% { fill: #0000FF; }
            60% { fill: #FFFF00; } 80% { fill: #00FFFF; } 100% { fill: #FF0000; }
        }
        .skin-path-rgb { animation: rgbPegman 4s linear infinite; }
        .skin-path-fire { fill: url(#fireGrad); }
        .skin-path-galaxy { fill: url(#galaxyGrad); }
        .skin-path-water { fill: url(#waterGrad); }
        .skin-path-default { fill: #FF9500; }

        .pegman-marker-container { background: transparent; border: none; }
        .target-glow-marker {
            background: #FF2D55;
            border: 2px solid #FFFFFF;
            border-radius: 50%;
            box-shadow: 0 0 14px #FF2D55;
        }
    </style>
</head>
<body>

    <!-- Шапка профиля -->
    <div class="header-card glass-panel">
        <div class="profile-box">
            <img id="user-avatar" class="avatar" src="https://ui-avatars.com/api/?name=Guest&background=EBEFF8&color=4A3AFF" alt="Avatar">
            <div class="profile-meta">
                <h4 id="user-name" class="user-title">Гость</h4>
                <span id="user-version-label" class="app-version">v1.6.1</span>
            </div>
        </div>
        <div class="header-right">
            <div id="coin-counter" class="coin-badge">🪙 1000</div>
        </div>
    </div>

    <!-- Вкладки навигации -->
    <div class="app-tabs">
        <button class="tab-btn active" id="tab-link-generator" onclick="switchView('generator')">🗺️ Карта</button>
        <button class="tab-btn" id="tab-link-shop" onclick="switchView('shop')">🛍️ Скины</button>
        <button class="tab-btn" id="tab-link-wheel" onclick="switchView('wheel')">🎡 Колесо</button>
    </div>

    <!-- ЭКРАН 1: ГЕНЕРАТОР -->
    <div id="view-generator" class="view-section active">
        <div class="main-card glass-panel">
            <div class="section-header">
                <h3 class="section-title">Радиус поиска</h3>
                <span id="radius-val" class="radius-display">500 м</span>
            </div>
            <div class="slider-wrapper">
                <input type="range" id="radius-slider" min="100" max="3000" step="50" value="500">
            </div>
            <div class="energy-container">
                <div class="energy-meta">
                    <span>Доступная энергия <span id="energy-timer" class="energy-timer"></span></span>
                    <span id="energy-text" style="color: #10B981">100 / 100 ⚡</span>
                </div>
                <div class="energy-bar-bg">
                    <div id="energy-bar" class="energy-bar-fill"></div>
                </div>
            </div>
            <button class="action-button" id="btn-generate">Сгенерировать точку (⚡ 10)</button>
            <div class="log-panel" id="status-text">
                Перетащите человечка для изменения центра зоны.
            </div>
        </div>
        <div class="map-wrapper glass-panel">
            <div id="map"></div>
        </div>
    </div>

    <!-- ЭКРАН 2: МАГАЗИН СКИНОВ -->
    <div id="view-shop" class="view-section">
        <div class="shop-subtabs">
            <button class="subtab-btn active" id="subtab-char" onclick="switchSubTab('char')">👤 Персонаж</button>
            <button class="subtab-btn" id="subtab-map" onclick="switchSubTab('map')">🗺️ Карта</button>
        </div>
        <div class="skins-grid" id="shop-items-container"></div>
    </div>

    <!-- ЭКРАН 3: КОЛЕСО ФОРТУНЫ -->
    <div id="view-wheel" class="view-section">
        <div class="wheel-view-container glass-panel">
            <div class="wheel-wrapper">
                <div class="wheel-pointer"></div>
                <div class="wheel-center-cap">🎯</div>
                <div id="wheel-circle" class="wheel-circle">
                    <div class="wheel-label wl-0"><span class="wl-num">1</span><span class="wl-txt">МОНЕТА</span></div>
                    <div class="wheel-label wl-1"><span class="wl-num">5</span><span class="wl-txt">МОНЕТ</span></div>
                    <div class="wheel-label wl-2"><span class="wl-num">10</span><span class="wl-txt">МОНЕТ</span></div>
                    <div class="wheel-label wl-3"><span class="wl-num">20</span><span class="wl-txt">МОНЕТ</span></div>
                    <div class="wheel-label wl-4"><span class="wl-num">50</span><span class="wl-txt">МОНЕТ</span></div>
                    <div class="wheel-label wl-5"><span class="wl-num">100</span><span class="wl-txt">МОНЕТ</span></div>
                </div>
            </div>
            
            <div id="wheel-status" class="wheel-status-text">
                Испытай удачу! Бесплатный прокрут доступен раз в 24 часа.
            </div>
            
            <button class="action-button" id="btn-spin-wheel" style="width: 90%; color: var(--primary-purple); font-weight: 700;">
                Испытать удачу
            </button>
        </div>
    </div>

    <script>
        // АУДИО-ДВИЖОК ДЛЯ ЗВУКОВ
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, delay = 0) {
            setTimeout(() => {
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(); osc.stop(audioCtx.currentTime + duration);
                } catch(e){}
            }, delay * 1000);
        }

        function playSoundClick() { playTone(580, 'sine', 0.04); triggerHaptic('light'); }
        function playSoundCoin() { playTone(950, 'sine', 0.08); playTone(1300, 'sine', 0.15, 0.06); triggerHaptic('medium'); }
        function playSoundTick() { playTone(280, 'triangle', 0.012); }
        function playSoundVictory() { 
            playTone(523, 'sine', 0.08); playTone(659, 'sine', 0.08, 0.08); 
            playTone(784, 'sine', 0.08, 0.16); playTone(1046, 'sine', 0.25, 0.24);
            triggerHaptic('success');
        }

        function triggerHaptic(style) {
            try {
                if(window.Telegram?.WebApp?.HapticFeedback) {
                    if(style === 'success') window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                    else window.Telegram.WebApp.HapticFeedback.impactOccurred(style);
                }
            } catch(e){}
        }

        // ПЕРЕМЕННЫЕ И ИНИЦИАЛИЗАЦИЯ
        let map, centerMarker, targetMarker, searchCircle, currentTileLayer;
        let centerCoords = [55.7558, 37.6173]; 
        let currentRadius = 500;
        
        let maxEnergy = 100;
        let currentCost = 10;
        let isVip = false;
        let currentWheelRotation = 0;

        let db = {
            coins: 1000,
            energy: 100,
            nextEnergyTime: 0, 
            lastFreeSpin: 0,   
            activeChar: 'default',
            activeMap: 'bright',
            unlocked: ['default', 'bright']
        };

        if(localStorage.getItem('geo_walk_save_v161')) {
            try { db = JSON.parse(localStorage.getItem('geo_walk_save_v161')); } catch(e){}
        }

        document.addEventListener("DOMContentLoaded", () => {
            const tg = window.Telegram.WebApp;
            tg.ready(); tg.expand();

            setupProfile(tg);
            initMap();
            setupControls();
            renderShop();
            initEnergySystem();
            updateWheelButtonState();

            setTimeout(() => { if(map) map.invalidateSize(); }, 300);
        });

        function setupProfile(tg) {
            const nameElem = document.getElementById("user-name");
            const avatarElem = document.getElementById("user-avatar");

            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                const user = tg.initDataUnsafe.user;
                nameElem.textContent = user.first_name;
                avatarElem.src = user.photo_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.first_name)}&background=E2E8F0&color=1c1c1e`;

                if (user.id === 5434932796 || (user.username && user.username.toLowerCase() === "kirushapross")) {
                    isVip = true;
                    nameElem.classList.add("vip-nick");
                }
            }
            updateCoinUI();
        }

        function updateCoinUI() {
            const counter = document.getElementById("coin-counter");
            counter.innerHTML = isVip ? "🪙 ∞" : `🪙 ${db.coins}`;
        }

        function saveGame() {
            localStorage.setItem('geo_walk_save_v161', JSON.stringify(db));
        }

        const REGEN_INTERVAL = 30 * 60 * 1000; 

        function initEnergySystem() {
            const now = Date.now();
            
            if (db.energy < maxEnergy && db.nextEnergyTime > 0) {
                if (now >= db.nextEnergyTime) {
                    let passedTime = now - db.nextEnergyTime;
                    let restoredUnits = Math.floor(passedTime / REGEN_INTERVAL) + 1;
                    db.energy = Math.min(maxEnergy, db.energy + restoredUnits);
                    db.nextEnergyTime = db.energy >= maxEnergy ? 0 : db.nextEnergyTime + (restoredUnits * REGEN_INTERVAL);
                }
            } else if (db.energy < maxEnergy && db.nextEnergyTime === 0) {
                db.nextEnergyTime = now + REGEN_INTERVAL;
            }
            
            saveGame();
            updateEnergyUI();

            setInterval(() => {
                if (db.energy >= maxEnergy) {
                    document.getElementById("energy-timer").textContent = "";
                    return;
                }

                const currentTime = Date.now();
                if (currentTime >= db.nextEnergyTime) {
                    db.energy++;
                    db.nextEnergyTime = db.energy >= maxEnergy ? 0 : currentTime + REGEN_INTERVAL;
                    saveGame(); updateEnergyUI(); updateWheelButtonState();
                } else {
                    let diff = db.nextEnergyTime - currentTime;
                    let minutes = Math.floor(diff / 60000);
                    let seconds = Math.floor((diff % 60000) / 1000);
                    document.getElementById("energy-timer").textContent = `(+1 через ${minutes}:${seconds < 10 ? '0' : ''}${seconds})`;
                }
            }, 1000);
        }

        function updateEnergyUI() {
            const energyText = document.getElementById("energy-text");
            const energyBar = document.getElementById("energy-bar");
            const btnGenerate = document.getElementById("btn-generate");

            energyText.textContent = `${db.energy} / ${maxEnergy} ⚡`;
            energyBar.style.width = `${db.energy}%`;

            btnGenerate.textContent = `Сгенерировать точку (⚡ ${currentCost})`;
            btnGenerate.disabled = db.energy < currentCost;
        }

        function getPegmanSVG(skinClass) {
            return `
                <svg width="32" height="42" viewBox="0 0 32 42" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0px 3px 5px rgba(0,0,0,0.2))">
                    <defs>
                        <linearGradient id="fireGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#FF8C00"/><stop offset="100%" stop-color="#FF2D55"/></linearGradient>
                        <linearGradient id="galaxyGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#5856D6"/><stop offset="50%" stop-color="#AF52DE"/><stop offset="100%" stop-color="#FF2D55"/></linearGradient>
                        <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#00F0FF"/><stop offset="100%" stop-color="#007AFF"/></linearGradient>
                    </defs>
                    <circle cx="16" cy="7" r="5" class="${skinClass}" stroke="#FFFFFF" stroke-width="2"/>
                    <path d="M16 13C11 13 8 16 8 21V30H11V40H14V32H18V40H21V30H24V21C24 16 21 13 16 13Z" class="${skinClass}" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round"/>
                </svg>
            `;
        }

        function getMapPreviewSVG(mapId) {
            let colorA = "#E2E8F0", colorB = "#CBD5E1", roadColor = "#FFFFFF";
            if (mapId === 'dark') { colorA = "#0F172A"; colorB = "#1E293B"; roadColor = "#334155"; }
            if (mapId === 'beige') { colorA = "#F5EBE6"; colorB = "#E6DCD2"; roadColor = "#FFFBF7"; }
            return `<svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" style="border-radius:10px;"><rect width="44" height="44" fill="${colorA}"/><path d="M-5 14H50M-5 30H50M16 -5V50M32 -5V50" stroke="${roadColor}" stroke-width="3.5"/></svg>`;
        }

        function initMap() {
            // ВЫРЕЗАН ВОДЯНОЙ ЗНАК STREETMAP (attributionControl: false)
            map = L.map('map', { 
                zoomControl: false, 
                attributionControl: false 
            }).setView(centerCoords, 14);
            
            applyMapSkin(db.activeMap);
            updatePegmanIcon();
            searchCircle = L.circle(centerCoords, { radius: currentRadius, color: '#5856D6', fillColor: '#5856D6', fillOpacity: 0.05, weight: 1.5 }).addTo(map);
        }

        function updatePegmanIcon() {
            if (centerMarker) map.removeLayer(centerMarker);
            const iconHtml = getPegmanSVG(`skin-path-${db.activeChar}`);
            const pegmanIcon = L.divIcon({ html: iconHtml, className: 'pegman-marker-container', iconSize: [32, 42], iconAnchor: [16, 40] });
            centerMarker = L.marker(centerCoords, { draggable: true, icon: pegmanIcon }).addTo(map);
            centerMarker.on('drag', (e) => {
                centerCoords = [e.latlng.lat, e.latlng.lng];
                searchCircle.setLatLng(e.latlng);
            });
        }

        function applyMapSkin(skinId) {
            if (currentTileLayer) map.removeLayer(currentTileLayer);
            let url = 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
            document.getElementById('map').className = skinId === 'beige' ? 'map-beige-filter' : '';
            if (skinId === 'dark') url = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
            
            // Удаляем лейбл из слоя тайлов
            currentTileLayer = L.tileLayer(url).addTo(map);
        }

        let currentShopTab = 'char';
        const skinsData = {
            char: [
                { id: 'default', name: 'Обычный пешеход', cls: 'skin-path-default', rarity: 'rare', rarityText: 'Базовый' },
                { id: 'water', name: 'Водный неон', cls: 'skin-path-water', rarity: 'rare', rarityText: 'Редкий' },
                { id: 'fire', name: 'Огненный лорд', cls: 'skin-path-fire', rarity: 'epic', rarityText: 'Эпический' },
                { id: 'galaxy', name: 'Космо-атлас', cls: 'skin-path-galaxy', rarity: 'legend', rarityText: 'Легенда' },
                { id: 'rgb', name: 'РГБ Геймер', cls: 'skin-path-rgb', rarity: 'legend', rarityText: 'Анимация' }
            ],
            map: [
                { id: 'bright', name: 'Voyager Светлая', mapId: 'bright', rarity: 'rare', rarityText: 'Базовый' },
                { id: 'dark', name: 'Dark Matter Ночь', mapId: 'dark', rarity: 'epic', rarityText: 'Особый' },
                { id: 'beige', name: 'Ретро Сепия', mapId: 'beige', rarity: 'legend', rarityText: 'Винтаж' }
            ]
        };

        function renderShop() {
            const container = document.getElementById("shop-items-container");
            container.innerHTML = "";
            const list = skinsData[currentShopTab];
            const activeId = currentShopTab === 'char' ? db.activeChar : db.activeMap;

            list.forEach(item => {
                const isUnlocked = db.unlocked.includes(item.id);
                const isApplied = item.id === activeId;
                let previewContent = currentShopTab === 'char' ? getPegmanSVG(item.cls) : getMapPreviewSVG(item.mapId);

                let btnText = "Купить 100"; let btnCls = "skin-btn buy";
                if (isUnlocked) {
                    if (isApplied) { btnText = "Применено"; btnCls = "skin-btn active-skin"; }
                    else { btnText = "Выбрать"; btnCls = "skin-btn"; }
                }

                const card = document.createElement("div");
                card.className = `skin-card glass-panel ${isApplied ? 'applied' : ''}`;
                card.innerHTML = `
                    <span class="skin-rarity rarity-${item.rarity}">${item.rarityText}</span>
                    <div class="skin-preview-box">${previewContent}</div>
                    <div class="skin-name">${item.name}</div>
                    <button class="${btnCls}" onclick="handleSkinAction('${item.id}')">${btnText}</button>
                `;
                container.appendChild(card);
            });
        }

        function handleSkinAction(id) {
            playSoundClick();
            const isUnlocked = db.unlocked.includes(id) || isVip;
            if (isUnlocked) {
                if (currentShopTab === 'char') { db.activeChar = id; updatePegmanIcon(); }
                else { db.activeMap = id; applyMapSkin(id); }
                saveGame(); renderShop();
            } else {
                if (isVip || db.coins >= 100) {
                    if(!isVip) db.coins -= 100;
                    db.unlocked.push(id); saveGame(); updateCoinUI(); handleSkinAction(id);
                } else { alert("Недостаточно монет!"); }
            }
        }

        // КОЛЕСО ФОРТУНЫ
        let isSpinning = false;
        const wheelSectors = [
            { label: "1 монета", word: "МОНЕТА", value: 1, weight: 45 },
            { label: "5 монет", word: "МОНЕТ", value: 5, weight: 25 },
            { label: "10 монет", word: "МОНЕТ", value: 10, weight: 18 },
            { label: "20 монет", word: "МОНЕТ", value: 20, weight: 8 },
            { label: "50 монет", word: "МОНЕТ", value: 50, weight: 3 },
            { label: "100 монет", word: "МОНЕТ", value: 100, weight: 1 }
        ];

        function updateWheelButtonState() {
            const btn = document.getElementById("btn-spin-wheel");
            const status = document.getElementById("wheel-status");
            const now = Date.now();
            const timePassed = now - db.lastFreeSpin;

            if (timePassed >= 24 * 60 * 60 * 1000) {
                btn.textContent = "Крутить БЕСПЛАТНО";
                status.textContent = "Вам доступен ежедневный бесплатный прокрут!";
                btn.disabled = false;
            } else {
                btn.textContent = "Крутить за 10 ⚡";
                let diff = (24 * 60 * 60 * 1000) - timePassed;
                let hoursLeft = Math.ceil(diff / (1000 * 60 * 60));
                status.textContent = `До бесплатного колеса: ~ ${hoursLeft} ч. Или крутите за энергию.`;
                btn.disabled = db.energy < 10;
            }
        }

        document.getElementById("btn-spin-wheel").addEventListener("click", () => {
            if (isSpinning) return;
            playSoundClick();

            const now = Date.now();
            const isFree = (now - db.lastFreeSpin) >= 24 * 60 * 60 * 1000;

            if (!isFree) {
                if (db.energy < 10) return;
                db.energy -= 10;
                if(db.energy < maxEnergy && db.nextEnergyTime === 0) db.nextEnergyTime = Date.now() + REGEN_INTERVAL;
                updateEnergyUI();
            } else {
                db.lastFreeSpin = now;
            }
            saveGame();
            updateWheelButtonState();

            let rand = Math.random() * 100;
            let sum = 0;
            let targetSectorIndex = 0;
            for (let i = 0; i < wheelSectors.length; i++) {
                sum += wheelSectors[i].weight;
                if (rand <= sum) { targetSectorIndex = i; break; }
            }

            isSpinning = true;
            document.getElementById("btn-spin-wheel").disabled = true;
            document.getElementById("wheel-status").textContent = "🎰 Разгоняем барабан удачи...";

            let sectorAngle = 60;
            let stopAngle = 360 - (targetSectorIndex * sectorAngle + 30);
            currentWheelRotation = Math.ceil(currentWheelRotation / 360) * 360 + (5 * 360) + stopAngle;

            const wheelCircle = document.getElementById("wheel-circle");
            wheelCircle.style.transform = `rotate(${currentWheelRotation}deg)`;

            let currentRotationTrack = 0;
            let tickInterval = setInterval(() => {
                currentRotationTrack += 18;
                if(currentRotationTrack < (5 * 360 + stopAngle)) { playSoundTick(); }
                else { clearInterval(tickInterval); }
            }, 50);

            setTimeout(() => {
                clearInterval(tickInterval);
                isSpinning = false;
                
                const reward = wheelSectors[targetSectorIndex];
                if (!isVip) db.coins += reward.value;
                saveGame();
                updateCoinUI();
                updateWheelButtonState();

                playSoundVictory();
                document.getElementById("wheel-status").innerHTML = `🎉 Отличный улов!<br>Вы выиграли <span style="color:#FF2D55; font-weight:800">${reward.value} ${reward.word}</span>`;
            }, 4000);
        });

        // ПЕРЕКЛЮЧЕНИЕ ЭКРАНОВ
        function switchView(view) {
            playSoundClick();
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            
            document.getElementById(`tab-link-${view}`).classList.add('active');
            document.getElementById(`view-${view}`).classList.add('active');
            
            if(view === 'generator') { setTimeout(() => { if(map) map.invalidateSize(); }, 50); }
            if(view === 'shop') { renderShop(); }
            if(view === 'wheel') { updateWheelButtonState(); }
        }

        function switchSubTab(type) {
            playSoundClick();
            currentShopTab = type;
            document.getElementById('subtab-char').classList.remove('active');
            document.getElementById('subtab-map').classList.remove('active');
            document.getElementById(`subtab-${type}`).classList.add('active');
            renderShop();
        }

        function calculateEnergyCost(radius) { return Math.floor(radius / 100) + 5; }

        function setupControls() {
            const slider = document.getElementById("radius-slider");
            const radiusVal = document.getElementById("radius-val");
            const btnGenerate = document.getElementById("btn-generate");

            const updateFill = (s) => {
                const pct = (s.value - s.min) / (s.max - s.min) * 100;
                s.style.background = `linear-gradient(to right, rgba(28,28,30,0.35) 0%, rgba(28,28,30,0.35) ${pct}%, rgba(120,120,128,0.15) ${pct}%, rgba(120,120,128,0.15) 100%)`;
            };

            updateFill(slider);
            currentCost = calculateEnergyCost(currentRadius);

            slider.addEventListener("input", (e) => {
                currentRadius = parseInt(e.target.value);
                radiusVal.textContent = currentRadius >= 1000 ? `${(currentRadius/1000).toFixed(1)} км` : `${currentRadius} м`;
                searchCircle.setRadius(currentRadius);
                updateFill(e.target);
                currentCost = calculateEnergyCost(currentRadius);
                updateEnergyUI();
            });

            map.on('click', (e) => {
                playSoundClick();
                centerCoords = [e.latlng.lat, e.latlng.lng];
                centerMarker.setLatLng(e.latlng);
                searchCircle.setLatLng(e.latlng);
            });

            btnGenerate.addEventListener("click", generateValidPoint);
        }

        function getRandomPointInCircle(lat, lng, radiusMeters) {
            const r = (radiusMeters / 111320) * Math.sqrt(Math.random());
            const theta = Math.random() * 2 * Math.PI;
            return { lat: lat + r * Math.cos(theta), lng: lng + r * Math.sin(theta) / Math.cos(lat * Math.PI / 180) };
        }

        async function checkPointSafety(lat, lng) {
            const query = `[out:json];(node(around:15,${lat},${lng});way(around:15,${lat},${lng}););out tags;`;
            try {
                const response = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                if (!response.ok) return true;
                const data = await response.json();
                for (let el of data.elements) {
                    if (el.tags) {
                        if (el.tags.building && el.tags.building !== 'no') return false;
                        if (el.tags.natural === 'water' || el.tags.waterway || el.tags.landuse === 'reservoir') return false;
                    }
                }
                return true;
            } catch (e) { return true; }
        }

        async function generateValidPoint() {
            if (db.energy < currentCost) return;
            playSoundClick();
            const statusBox = document.getElementById("status-text");
            statusBox.innerHTML = "⏳ Сканируем карту на наличие преград...";
            
            let attempts = 0, validPoint = null;
            while (attempts < 15) {
                let candidate = getRandomPointInCircle(centerCoords[0], centerCoords[1], currentRadius);
                if (await checkPointSafety(candidate.lat, candidate.lng)) { validPoint = candidate; break; }
                attempts++;
            }

            if (validPoint) {
                db.energy -= currentCost;
                if(db.energy < maxEnergy && db.nextEnergyTime === 0) db.nextEnergyTime = Date.now() + REGEN_INTERVAL;
                saveGame(); updateEnergyUI(); updateWheelButtonState();
                
                if (targetMarker) map.removeLayer(targetMarker);
                targetMarker = L.marker([validPoint.lat, validPoint.lng], {
                    icon: L.divIcon({ className: 'target-glow-marker', iconSize: [14, 14] })
                }).addTo(map);
                map.panTo([validPoint.lat, validPoint.lng]);
                playSoundCoin();
                statusBox.innerHTML = `🎯 Точка создана!<br>Координаты: ${validPoint.lat.toFixed(5)}, ${validPoint.lng.toFixed(5)}`;
            } else {
                statusBox.innerHTML = "❌ Ошибка подбора локации. Смените позицию.";
            }
        }
    </script>
</body>
</html>
